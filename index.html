", "q": "Which components may all contribute to an organization's value delivery system?", "choices": ["Only projects", "Only programs and portfolios", "Portfolios, programs, projects, products, and operations", "Only operations"], "answer": 2, "explanation": "These components can generate value individually and collectively.", "whyWrong": ["Projects are only one component.", "Programs and portfolios are not the only components.", "", "Operations also contribute to value."], "clue": "Think about how projects, programs, portfolios, products, and operations work together.", "lesson": "Lesson 1.4 \u2014 The Value Delivery System", "id": 16, "chapter": "chapter1", "section": "1.4"}, {"topic": "Value Delivery System", "difficulty": "Foundation", "q": "What is a value delivery system?", "choices": ["A detailed project schedule", "A collection of strategic business activities used to build, sustain, or advance an organization", "A list of approved vendors", "A financial accounting system"], "answer": 1, "explanation": "A value delivery system aligns organizational work and components with strategy and desired outcomes.", "whyWrong": ["A schedule is only one management artifact.", "", "Vendor lists do not constitute the system.", "Financial systems may support value delivery but are not the whole system."], "clue": "Think about how projects, programs, portfolios, products, and operations work together.", "lesson": "Lesson 1.4 \u2014 The Value Delivery System", "id": 17, "chapter": "chapter1", "section": "1.4"}, {"topic": "Programs and Portfolios", "difficulty": "Foundation", "q": "What is a program?", "choices": ["A group of related projects managed in a coordinated manner to obtain benefits not available from managing them separately", "A single large project", "A collection of unrelated operations", "A list of project activities"], "answer": 0, "explanation": "Programs coordinate related projects to obtain combined benefits and control.", "whyWrong": ["", "Size alone does not make a project a program.", "Programs are not simply unrelated operations.", "A task list is not a program."], "clue": "Programs coordinate related projects; portfolios align investments with strategy.", "lesson": "Lesson 1.5 \u2014 Programs and Portfolios", "id": 18, "chapter": "chapter1", "section": "1.5"}, {"topic": "Programs and Portfolios", "difficulty": "Foundation", "q": "What is a portfolio?", "choices": ["A collection of programs, projects, and operations managed as a group to achieve strategic objectives", "A single project's schedule and budget", "A group containing only related projects", "A department's routine procedures"], "answer": 0, "explanation": "A portfolio aligns selected work with strategy and maximizes organizational value.", "whyWrong": ["", "A schedule and budget belong to one project.", "Portfolios may include related or unrelated work aligned by strategy.", "Routine procedures are not a portfolio."], "clue": "Programs coordinate related projects; portfolios align investments with strategy.", "lesson": "Lesson 1.5 \u2014 Programs and Portfolios", "id": 19, "chapter": "chapter1", "section": "1.5"}, {"topic": "Programs and Portfolios", "difficulty": "Foundation", "q": "Which sequence moves from the broadest grouping to the most specific?", "choices": ["Project \u2192 Program \u2192 Portfolio", "Portfolio \u2192 Program \u2192 Project", "Program \u2192 Portfolio \u2192 Project", "Operations \u2192 Portfolio \u2192 Project"], "answer": 1, "explanation": "A portfolio may contain programs, and programs may contain related projects.", "whyWrong": ["This reverses the hierarchy.", "", "A portfolio is broader than a program.", "Operations are not the top level of this hierarchy."], "clue": "Programs coordinate related projects; portfolios align investments with strategy.", "lesson": "Lesson 1.5 \u2014 Programs and Portfolios", "id": 20, "chapter": "chapter1", "section": "1.5"}, {"topic": "Programs and Portfolios", "difficulty": "Scenario", "q": "Several related projects share resources and collectively deliver a major organizational capability. How should they most likely be managed?", "choices": ["As unrelated operations", "As a program", "As a single task", "As a permanent department"], "answer": 1, "explanation": "Related projects managed together for combined benefits are a program.", "whyWrong": ["The work is temporary and related, not routine operations.", "", "A set of projects is broader than a single task.", "A temporary coordinated effort is not a permanent department."], "clue": "Programs coordinate related projects; portfolios align investments with strategy.", "lesson": "Lesson 1.5 \u2014 Programs and Portfolios", "id": 21, "chapter": "chapter1", "section": "1.5"}, {"topic": "Programs and Portfolios", "difficulty": "Scenario", "q": "An executive group is selecting and prioritizing projects and programs based on strategy and available investment. What level of management is this?", "choices": ["Project management", "Program management", "Portfolio management", "Operations management"], "answer": 2, "explanation": "Portfolio management selects, prioritizes, and balances work to achieve strategic objectives and maximize value.", "whyWrong": ["Project management focuses on one project.", "Program management coordinates related projects.", "", "Operations management sustains ongoing functions."], "clue": "Programs coordinate related projects; portfolios align investments with strategy.", "lesson": "Lesson 1.5 \u2014 Programs and Portfolios", "id": 22, "chapter": "chapter1", "section": "1.5"}, {"topic": "Programs and Portfolios", "difficulty": "Scenario", "q": "Why should portfolio, program, project, and operations leaders coordinate?", "choices": ["They may compete for resources and engage the same stakeholders", "They must use identical development approaches", "Operations always control every project", "Projects cannot create value without becoming programs"], "answer": 0, "explanation": "Coordination helps balance resources, stakeholder demands, dependencies, and strategic priorities.", "whyWrong": ["", "Different work may require different approaches.", "Authority depends on governance, not a universal rule.", "Projects can create value independently."], "clue": "Programs coordinate related projects; portfolios align investments with strategy.", "lesson": "Lesson 1.5 \u2014 Programs and Portfolios", "id": 23, "chapter": "chapter1", "section": "1.5"}, {"topic": "Governance", "difficulty": "Foundation", "q": "What does project governance provide?", "choices": ["A framework, functions, and processes that guide decisions and activities toward value delivery", "Only a project calendar", "Only the project manager's job description", "A replacement for stakeholder engagement"], "answer": 0, "explanation": "Governance guides authority, oversight, alignment, decision-making, and value delivery.", "whyWrong": ["", "A calendar is only a planning tool.", "A job description does not define the full governance system.", "Governance and stakeholder engagement complement each other."], "clue": "Look for authority, accountability, decision rights, escalation, and appropriate tailoring.", "lesson": "Lesson 1.6 \u2014 Governance", "id": 24, "chapter": "chapter1", "section": "1.6"}, {"topic": "Governance", "difficulty": "Foundation", "q": "Should project governance be identical for every project?", "choices": ["Yes, every project requires the same controls", "No, governance should be tailored to the project and organizational context", "Yes, but only for adaptive projects", "No, because projects do not require governance"], "answer": 1, "explanation": "Governance should be appropriate for the industry's requirements, organizational structure, project complexity, and development approach.", "whyWrong": ["One-size-fits-all governance can create waste or gaps.", "", "Adaptive projects still require tailored governance.", "Projects require appropriate governance."], "clue": "Look for authority, accountability, decision rights, escalation, and appropriate tailoring.", "lesson": "Lesson 1.6 \u2014 Governance", "id": 25, "chapter": "chapter1", "section": "1.6"}, {"topic": "Governance", "difficulty": "Scenario", "q": "A small adaptive project is subject to the same extensive controls used for a large regulated program. What should the project manager recommend?", "choices": ["Keep every control because governance must be identical", "Tailor governance while preserving required oversight and compliance", "Remove all governance because the approach is adaptive", "Transfer governance responsibility to the customer"], "answer": 1, "explanation": "Governance should be tailored without removing mandatory oversight or compliance.", "whyWrong": ["Excessive controls may waste resources.", "", "Adaptive work still needs governance.", "Governance responsibility is defined by the organization, not simply transferred."], "clue": "Look for authority, accountability, decision rights, escalation, and appropriate tailoring.", "lesson": "Lesson 1.6 \u2014 Governance", "id": 26, "chapter": "chapter1", "section": "1.6"}, {"topic": "Governance", "difficulty": "Foundation", "q": "What can result from excessive governance?", "choices": ["Unnecessary use of resources and slower decision-making", "Automatic delivery of more value", "Elimination of stakeholder needs", "Conversion of the project into a portfolio"], "answer": 0, "explanation": "Too much governance can create overhead, delay, and wasted effort.", "whyWrong": ["", "More governance does not automatically mean more value.", "Governance does not eliminate stakeholder needs.", "Governance level does not determine whether work is a portfolio."], "clue": "Look for authority, accountability, decision rights, escalation, and appropriate tailoring.", "lesson": "Lesson 1.6 \u2014 Governance", "id": 27, "chapter": "chapter1", "section": "1.6"}, {"topic": "Governance", "difficulty": "Foundation", "q": "What can result from insufficient governance?", "choices": ["Guaranteed early completion", "Strategic misalignment and project performance problems", "Automatic cost savings", "Elimination of uncertainty"], "answer": 1, "explanation": "Too little governance can produce unclear authority, weak oversight, misalignment, and performance issues.", "whyWrong": ["Insufficient governance does not guarantee speed or success.", "", "Reduced oversight may increase costs.", "Uncertainty cannot be eliminated."], "clue": "Look for authority, accountability, decision rights, escalation, and appropriate tailoring.", "lesson": "Lesson 1.6 \u2014 Governance", "id": 28, "chapter": "chapter1", "section": "1.6"}, {"topic": "Governance", "difficulty": "Scenario", "q": "A decision exceeds the project manager's authority. What should the project manager do?", "choices": ["Make the decision privately to avoid delay", "Use the defined governance and escalation path", "Ask any available team member to approve it", "Ignore the issue"], "answer": 1, "explanation": "Governance defines authority and escalation paths for decisions outside the project manager's delegated authority.", "whyWrong": ["Acting outside delegated authority violates governance.", "", "Approval must come from the authorized role.", "Ignoring the issue creates risk and delay."], "clue": "Look for authority, accountability, decision rights, escalation, and appropriate tailoring.", "lesson": "Lesson 1.6 \u2014 Governance", "id": 29, "chapter": "chapter1", "section": "1.6"}, {"topic": "Governance", "difficulty": "Scenario", "q": "A sponsor asks the project manager to implement a major scope change without documenting it. What is the best response?", "choices": ["Implement it immediately because the sponsor requested it", "Follow the project's governance and change-control approach", "Ask the team to make the change unofficially", "Wait until closing to record it"], "answer": 1, "explanation": "Even sponsor-requested changes should follow the applicable governance and change process.", "whyWrong": ["Sponsor authority does not eliminate required governance.", "", "Unofficial changes undermine control and traceability.", "Late documentation creates risk and poor decision records."], "clue": "Look for authority, accountability, decision rights, escalation, and appropriate tailoring.", "lesson": "Lesson 1.6 \u2014 Governance", "id": 30, "chapter": "chapter1", "section": "1.6"}, {"topic": "Roles", "difficulty": "Foundation", "q": "Who may perform project management responsibilities?", "choices": ["Only someone formally titled Project Manager", "Different roles depending on the governance structure and project context", "Only the sponsor", "Only a certified portfolio manager"], "answer": 1, "explanation": "Project management functions may be performed by project managers, functional managers, product owners, team leads, or others depending on context.", "whyWrong": ["The function matters more than the title.", "", "Sponsors provide support and direction but do not necessarily manage daily work.", "Portfolio management is a different level of work."], "clue": "The function and responsibility matter more than the formal job title.", "lesson": "Lesson 1.7 \u2014 Roles and Stakeholders", "id": 31, "chapter": "chapter1", "section": "1.7"}, {"topic": "Roles", "difficulty": "Foundation", "q": "What matters more than the formal title of the person overseeing a project?", "choices": ["The size of the person's department", "The characteristics of the project and proper fulfillment of project management functions", "The person's office location", "The number of direct reports"], "answer": 1, "explanation": "The nature of the project and the functions performed matter more than a specific job title.", "whyWrong": ["Department size does not determine project management effectiveness.", "", "Office location is irrelevant.", "Direct-report count does not define the role."], "clue": "The function and responsibility matter more than the formal job title.", "lesson": "Lesson 1.7 \u2014 Roles and Stakeholders", "id": 32, "chapter": "chapter1", "section": "1.7"}, {"topic": "Roles", "difficulty": "Foundation", "q": "Who is a stakeholder?", "choices": ["Only the sponsor and project manager", "Anyone who can affect, be affected by, or perceive themselves to be affected by the project", "Only people receiving project funds", "Only members of the project team"], "answer": 1, "explanation": "Stakeholders include individuals, groups, and organizations that affect or are affected by the project.", "whyWrong": ["Stakeholders extend beyond these two roles.", "", "Financial recipients are only one possible stakeholder group.", "Team members are stakeholders, but they are not the only stakeholders."], "clue": "The function and responsibility matter more than the formal job title.", "lesson": "Lesson 1.7 \u2014 Roles and Stakeholders", "id": 33, "chapter": "chapter1", "section": "1.7"}, {"topic": "Roles", "difficulty": "Scenario", "q": "A project manager discovers that an important user group was not consulted during planning. What should be done first?", "choices": ["Continue because planning is already complete", "Identify and engage the overlooked stakeholders to understand their needs and impact", "Remove the user group from the stakeholder list", "Wait until testing begins"], "answer": 1, "explanation": "Stakeholders should be identified and engaged early enough to influence objectives, requirements, and value.", "whyWrong": ["Continuing without engagement increases risk.", "", "Excluding affected users is inappropriate.", "Waiting may cause avoidable rework."], "clue": "The function and responsibility matter more than the formal job title.", "lesson": "Lesson 1.7 \u2014 Roles and Stakeholders", "id": 34, "chapter": "chapter1", "section": "1.7"}, {"topic": "Adaptation", "difficulty": "Scenario", "q": "Project conditions change and the original approach no longer supports the expected outcome. What should the project manager do?", "choices": ["Follow the original plan regardless of evidence", "Adapt the approach while preserving alignment, governance, and value", "Cancel every deliverable", "Avoid informing stakeholders"], "answer": 1, "explanation": "Effective project management adapts to context while maintaining strategic alignment and value.", "whyWrong": ["Rigid adherence may reduce value.", "", "Cancellation is not automatically required.", "Stakeholder communication is essential during change."], "clue": "Prefer responsible tailoring that preserves compliance, alignment, and value.", "lesson": "Lesson 1.8 \u2014 Tailoring and Adaptation", "id": 35, "chapter": "chapter1", "section": "1.8"}, {"topic": "Adaptation", "difficulty": "Scenario", "q": "A team proposes a simpler process that meets governance requirements and reduces delay. What is the best action?", "choices": ["Reject it because the original process cannot change", "Evaluate and adopt it if it improves value and remains compliant", "Adopt it without review", "Use both processes permanently"], "answer": 1, "explanation": "Tailoring and continuous improvement are appropriate when they preserve required controls and improve outcomes.", "whyWrong": ["Processes may be tailored when justified.", "", "Review is required before adoption.", "Duplicating processes may add waste."], "clue": "Prefer responsible tailoring that preserves compliance, alignment, and value.", "lesson": "Lesson 1.8 \u2014 Tailoring and Adaptation", "id": 36, "chapter": "chapter1", "section": "1.8"}, {"topic": "Value", "difficulty": "Scenario", "q": "A schedule report is produced every week, but no stakeholder uses it to make decisions. What should the project manager consider?", "choices": ["Continue because every project must produce the same reports", "Tailor reporting to provide useful information that supports value and decisions", "Increase the report length", "Stop all communication"], "answer": 1, "explanation": "Artifacts and reports should serve a useful purpose; tailoring can remove waste while preserving needed transparency.", "whyWrong": ["Reporting should be appropriate to context.", "", "Length does not create usefulness.", "Communication should be improved, not eliminated."], "clue": "Focus on benefits, stakeholder needs, and whether the outcome is worth the investment.", "lesson": "Lesson 1.2 \u2014 Value and Benefits", "id": 37, "chapter": "chapter1", "section": "1.2"}, {"topic": "Project Success", "difficulty": "Scenario", "q": "Which action most improves the likelihood that project success will be assessed consistently?", "choices": ["Define success only after delivery", "Agree on measurable and qualitative success criteria with stakeholders early", "Use only budget variance", "Let each stakeholder use an undisclosed definition"], "answer": 1, "explanation": "Early agreement on success criteria helps align expectations and supports consistent assessment.", "whyWrong": ["Late definition invites disagreement.", "", "Budget variance is only one measure.", "Undisclosed definitions create confusion."], "clue": "Do not rely only on scope, schedule, and cost; consider outcomes and stakeholder agreement.", "lesson": "Lesson 1.3 \u2014 Project Success", "id": 38, "chapter": "chapter1", "section": "1.3"}, {"topic": "Programs and Portfolios", "difficulty": "Scenario", "q": "A project no longer supports organizational strategy, even though it is performing well. What should portfolio leadership consider?", "choices": ["Continue it solely because it is on schedule", "Reassess its priority and continued investment based on strategic value", "Convert it into operations automatically", "Increase its budget"], "answer": 1, "explanation": "Portfolio decisions should reflect strategic alignment and value, not only project execution performance.", "whyWrong": ["Good execution does not justify strategically misaligned work.", "", "Reclassification does not solve strategic misalignment.", "More budget may worsen value."], "clue": "Programs coordinate related projects; portfolios align investments with strategy.", "lesson": "Lesson 1.5 \u2014 Programs and Portfolios", "id": 39, "chapter": "chapter1", "section": "1.5"}, {"topic": "Governance", "difficulty": "Scenario", "q": "A project team is unclear about who can approve funding changes. What is the most appropriate action?", "choices": ["Let the team vote", "Clarify decision authority in the governance framework", "Allow the vendor to decide", "Avoid funding changes entirely"], "answer": 1, "explanation": "Governance should make authority, accountability, and escalation paths clear.", "whyWrong": ["Voting does not replace delegated authority.", "", "Vendors do not typically hold organizational funding authority.", "Avoidance does not resolve the governance gap."], "clue": "Look for authority, accountability, decision rights, escalation, and appropriate tailoring.", "lesson": "Lesson 1.6 \u2014 Governance", "id": 40, "chapter": "chapter1", "section": "1.6"}, {"topic": "Value Delivery System", "difficulty": "Scenario", "q": "A project delivers a new capability, but no operational process exists to use it. What is the primary concern?", "choices": ["The project has too many stakeholders", "The value delivery system is incomplete because the capability may not be sustained or used", "The project should become a portfolio", "The schedule is automatically invalid"], "answer": 1, "explanation": "Value often depends on integration between projects and operations so delivered capabilities can produce ongoing benefits.", "whyWrong": ["Stakeholder count is not the primary issue.", "", "A missing operational process does not make the work a portfolio.", "The schedule may still be valid even though value realization is at risk."], "clue": "Think about how projects, programs, portfolios, products, and operations work together.", "lesson": "Lesson 1.4 \u2014 The Value Delivery System", "id": 41, "chapter": "chapter1", "section": "1.4"}, {"topic": "Value", "difficulty": "PMP-style", "q": "A sponsor asks the project manager to accelerate delivery by removing a validation activity. The activity is the main way users confirm that the outcome meets their needs. What should the project manager do first?", "choices": ["Remove the activity because the sponsor requested it", "Assess the effect on expected value, quality, and stakeholder acceptance before deciding", "Ask the team to work overtime and keep the activity", "Wait until closing to determine whether validation was necessary"], "answer": 1, "explanation": "The first step is to assess the impact on value and stakeholder acceptance before making or escalating the decision.", "whyWrong": ["Sponsor requests still require informed analysis and governance.", "", "Overtime may not address the underlying trade-off and should not be the first response.", "Waiting until closing would create avoidable risk and rework."], "clue": "Focus on benefits, stakeholder needs, and whether the outcome is worth the investment.", "lesson": "Lesson 1.2 \u2014 Value and Benefits", "id": 42, "chapter": "chapter1", "section": "1.2"}, {"topic": "Governance", "difficulty": "PMP-style", "q": "Two leaders give the project team conflicting directions about a major decision. What should the project manager do next?", "choices": ["Follow the direction from the most senior person without checking authority", "Use the governance framework to clarify decision authority and resolve the conflict", "Let the team choose which direction it prefers", "Pause all project work indefinitely"], "answer": 1, "explanation": "Governance should identify who has decision authority and how conflicts are escalated.", "whyWrong": ["Seniority alone may not equal delegated project authority.", "", "Team preference does not replace governance.", "A targeted escalation is more appropriate than stopping all work indefinitely."], "clue": "Look for authority, accountability, decision rights, escalation, and appropriate tailoring.", "lesson": "Lesson 1.6 \u2014 Governance", "id": 43, "chapter": "chapter1", "section": "1.6"}, {"topic": "Project Success", "difficulty": "PMP-style", "q": "Near the end of a project, the sponsor says the deliverable is complete, but customers disagree that the expected outcome has been achieved. What should the project manager do first?", "choices": ["Close the project because the sponsor is satisfied", "Revisit the agreed success criteria and facilitate stakeholder alignment on the evidence", "Ask customers to accept the deliverable without discussion", "Measure only final cost variance"], "answer": 1, "explanation": "The project manager should use previously agreed success criteria and evidence to align stakeholders before concluding whether the project succeeded.", "whyWrong": ["Sponsor satisfaction alone may not establish success.", "", "Forced acceptance does not resolve the disagreement.", "Cost variance is only one measure."], "clue": "Do not rely only on scope, schedule, and cost; consider outcomes and stakeholder agreement.", "lesson": "Lesson 1.3 \u2014 Project Success", "id": 44, "chapter": "chapter1", "section": "1.3"}, {"topic": "Programs and Portfolios", "difficulty": "PMP-style", "q": "A project is performing well but no longer supports the organization's strategic priorities. Who should primarily reassess whether investment should continue?", "choices": ["The individual project team alone", "Portfolio leadership using strategic value and prioritization criteria", "The vendor", "Operations staff only"], "answer": 1, "explanation": "Portfolio leadership evaluates whether investments remain aligned with strategy and continue to justify resources.", "whyWrong": ["The project team can provide information but does not normally own portfolio prioritization.", "", "A vendor does not own organizational investment decisions.", "Operations input may be useful but is not the sole decision authority."], "clue": "Programs coordinate related projects; portfolios align investments with strategy.", "lesson": "Lesson 1.5 \u2014 Programs and Portfolios", "id": 45, "chapter": "chapter1", "section": "1.5"}, {"topic": "Roles", "difficulty": "PMP-style", "q": "A project uses a product owner instead of someone formally titled project manager. Which statement is most accurate?", "choices": ["The work cannot be considered a project", "Project management responsibilities may be performed by different roles depending on context", "Only the sponsor may coordinate the work", "Governance is unnecessary when a product owner is present"], "answer": 1, "explanation": "The PMBOK framework emphasizes the project management functions being performed rather than requiring one universal title.", "whyWrong": ["A specific title is not required for work to be a project.", "", "Sponsors do not necessarily perform daily coordination.", "All projects need appropriate governance."], "clue": "The function and responsibility matter more than the formal job title.", "lesson": "Lesson 1.7 \u2014 Roles and Stakeholders", "id": 46, "chapter": "chapter1", "section": "1.7"}, {"topic": "Adaptation", "difficulty": "PMP-style", "q": "A required report takes several hours to prepare, but stakeholders use only one section. What is the best action?", "choices": ["Stop reporting without notifying anyone", "Tailor the report with stakeholder and governance approval so it remains useful and compliant", "Continue the full report forever because it existed in the original plan", "Add more sections to increase its value"], "answer": 1, "explanation": "Tailoring should remove waste while preserving transparency, compliance, and stakeholder needs.", "whyWrong": ["Unilateral removal may violate governance or stakeholder expectations.", "", "Plans may be adapted when justified.", "More content does not necessarily create more value."], "clue": "Prefer responsible tailoring that preserves compliance, alignment, and value.", "lesson": "Lesson 1.8 \u2014 Tailoring and Adaptation", "id": 47, "chapter": "chapter1", "section": "1.8"}, {"topic": "Value Delivery System", "difficulty": "PMP-style", "q": "A project successfully delivers a new service, but the organization has not funded the operations needed to sustain it. What is the greatest concern?", "choices": ["The project used too few meetings", "The expected value may not be realized because the service cannot be sustained", "The work must be converted into a program", "The project schedule is automatically invalid"], "answer": 1, "explanation": "Value realization depends on the broader value delivery system, including operations that sustain the delivered service.", "whyWrong": ["Meeting volume is not the core issue.", "", "A missing operating model does not automatically make the work a program.", "The schedule may still be valid even though benefits are at risk."], "clue": "Think about how projects, programs, portfolios, products, and operations work together.", "lesson": "Lesson 1.4 \u2014 The Value Delivery System", "id": 48, "chapter": "chapter1", "section": "1.4"}, {"topic": "Projects and Operations", "difficulty": "PMP-style", "q": "After a project launches a new system, a permanent team handles routine support and recurring updates. How should that support work be classified?", "choices": ["A continuation of the original project forever", "Operations", "A portfolio", "A project charter"], "answer": 1, "explanation": "Routine, ongoing support is operations, even though the capability was originally created by a project.", "whyWrong": ["A project is temporary and does not continue forever.", "", "A portfolio is a strategic grouping of work.", "A charter is an authorization document, not ongoing work."], "clue": "Look for whether the work is temporary and unique or ongoing and sustaining.", "lesson": "Lesson 1.1 \u2014 Projects and Operations", "id": 49, "chapter": "chapter1", "section": "1.1"}], "chapter2": [{"id": 1000, "chapter": "chapter2",
